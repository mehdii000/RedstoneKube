config-version = "2.7"
bind = "0.0.0.0:25565"
motd = "<#09add3>mc-platform lobby"
online-mode = true
player-info-forwarding-mode = "modern"
forwarding-secret-file = "/secret/forwarding.secret"

[servers]
lobby = "lobby.mc.svc.cluster.local:25565"
try = ["lobby"]

# Empty: without this, Velocity injects default forced-hosts referencing servers we don't define.
[forced-hosts]

[advanced]
haproxy-protocol = false
