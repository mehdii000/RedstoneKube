# Loaded by SWM at startup; readOnly so the lobby stays disposable (no writes persist).
worlds:
  lobby:
    source: file
    difficulty: peaceful
    spawn: 0, -60, 0
    allowMonsters: false
    allowAnimals: false
    loadOnStartup: true
    readOnly: true
    saveBlockTicks: false
    saveFluidTicks: false
    savePoi: false
