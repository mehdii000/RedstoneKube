apiVersion: apps/v1
kind: Deployment
metadata: { name: lobby, namespace: mc }
spec:
  replicas: 1
  selector: { matchLabels: { app: lobby } }
  template:
    metadata: { labels: { app: lobby } }
    spec:
      containers:
        - name: lobby
          image: mc/lobby:dev
          imagePullPolicy: IfNotPresent
          ports: [ { containerPort: 25565 } ]
          volumeMounts:
            - { name: secret, mountPath: /secret, readOnly: true }
            - { name: work, mountPath: /server/cache }   # ephemeral scratch
          readinessProbe:
            tcpSocket: { port: 25565 }
            initialDelaySeconds: 20
            periodSeconds: 5
      volumes:
        - name: secret
          secret:
            secretName: velocity-forwarding
            items: [ { key: forwarding.secret, path: forwarding.secret } ]
        - name: work
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: { name: lobby, namespace: mc }
spec:
  selector: { app: lobby }
  ports: [ { port: 25565, targetPort: 25565 } ]
